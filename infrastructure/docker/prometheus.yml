global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']

  - job_name: 'identity-service'
    static_configs:
      - targets: ['identity-service:3001']

  - job_name: 'authorization-service'
    static_configs:
      - targets: ['authorization-service:3002']

  - job_name: 'tenant-service'
    static_configs:
      - targets: ['tenant-service:3003']
